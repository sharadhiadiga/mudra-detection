<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Mudra Detection</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }
    .wrap {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: 0.02em;
    }
    .instruction {
      font-size: 0.95rem;
      opacity: 0.85;
      margin: 0 0 1rem;
      line-height: 1.45;
      max-width: 36rem;
    }
    .stage {
      position: relative;
      width: min(640px, 100%);
      aspect-ratio: 4 / 3;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
    }
    video, canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
    video { transform: scaleX(-1); }
    canvas { display: none; }
    .guide {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .guide-box {
      width: 55%;
      height: 72%;
      border: 3px dashed rgba(120, 200, 255, 0.75);
      border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.25);
    }
    .result {
      margin-top: 1.25rem;
      font-size: 2.25rem;
      font-weight: 700;
      min-height: 2.75rem;
      letter-spacing: 0.02em;
    }
    .result.locked { color: #7cf; }
    button {
      margin-top: 1.25rem;
      padding: 0.55rem 1.25rem;
      border-radius: 8px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #eee;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #333; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Live Mudra Detection</h1>
    <p class="instruction">
      Hold your hand steady in the frame. Press <strong>Reset</strong> to clear the session and start fresh
      (starts the camera the first time if it is not already on).
    </p>
    <div class="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="canvas"></canvas>
      <div class="guide"><div class="guide-box"></div></div>
    </div>
    <div class="result" id="mainPred">Detecting...</div>
    <button type="button" id="btnReset">Reset</button>
  </div>
  <script>
    const API_BASE = 'http://127.0.0.1:8000';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btnReset = document.getElementById('btnReset');
    const mainPred = document.getElementById('mainPred');

    const INTERVAL_MS = 400;
    const VOTE_WINDOW = 7;
    const LOCK_STREAK = 4;
    const MAJORITY_STRONG = 4;
    const UNSTABLE_MS = 3000;
    const MIN_CONF_FOR_VOTE = 0.2;

    function cleanMudraLabel(s) {
      if (s == null || typeof s !== 'string') return s;
      return s.split('(')[0].trim();
    }

    let timer = null;
    let stream = null;
    const recent = [];
    let lastMudra = null;
    let streak = 0;
    let lockedMudra = null;
    let lastStableMudra = null;
    let unstableSince = null;

    function applyFullResetUI() {
      recent.length = 0;
      lockedMudra = null;
      streak = 0;
      lastMudra = null;
      unstableSince = null;
      lastStableMudra = null;
      mainPred.textContent = 'Detecting...';
      mainPred.classList.remove('locked');
    }

    function majorityStats(arr) {
      const counts = {};
      for (const m of arr) counts[m] = (counts[m] || 0) + 1;
      let best = null;
      let n = -1;
      for (const [k, v] of Object.entries(counts)) {
        if (v > n) {
          n = v;
          best = k;
        }
      }
      return { label: best, count: n };
    }

    function drawFrame() {
      const w = video.videoWidth;
      const h = video.videoHeight;
      if (!w || !h) return null;
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(video, 0, 0, w, h);
      return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.92);
      });
    }

    function pickDisplayMajority(majLabel, majCount, now) {
      const unstable =
        recent.length >= VOTE_WINDOW && majCount < MAJORITY_STRONG;
      if (!unstable) {
        unstableSince = null;
        lastStableMudra = majLabel;
        return majLabel;
      }
      if (unstableSince == null) unstableSince = now;
      if (lastStableMudra != null && now - unstableSince >= UNSTABLE_MS) {
        return lastStableMudra;
      }
      return majLabel;
    }

    async function tick() {
      if (!stream || video.readyState < 2) return;
      const blob = await drawFrame();
      if (!blob) return;
      const fd = new FormData();
      fd.append('file', blob, 'frame.jpg');
      const now = performance.now();
      try {
        const res = await fetch(`${API_BASE}/mudra/predict-frame`, { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          mainPred.textContent =
            res.status === 503 && data.detail ? String(data.detail) : `Error (${res.status})`;
          mainPred.classList.remove('locked');
          return;
        }
        const mudraRaw = data.mudra;
        const conf = typeof data.confidence === 'number' ? data.confidence : 0;

        if (mudraRaw == null) {
          return;
        }
        const mudra = cleanMudraLabel(String(mudraRaw));

        if (conf >= MIN_CONF_FOR_VOTE) {
          recent.push(mudra);
          while (recent.length > VOTE_WINDOW) recent.shift();
        }

        const { label: maj, count: majCount } = majorityStats(recent);
        const displayMaj = pickDisplayMajority(maj, majCount, now);

        if (lockedMudra == null) {
          if (conf >= MIN_CONF_FOR_VOTE) {
            if (mudra === lastMudra) streak += 1;
            else {
              lastMudra = mudra;
              streak = 1;
            }
            if (streak >= LOCK_STREAK) {
              lockedMudra = mudra;
            }
          }
        }

        if (lockedMudra != null) {
          mainPred.textContent = cleanMudraLabel(lockedMudra);
          mainPred.classList.add('locked');
        } else {
          const shown = displayMaj && displayMaj.length ? cleanMudraLabel(displayMaj) : '';
          mainPred.textContent = shown && shown.length ? shown : 'Detecting...';
          mainPred.classList.remove('locked');
        }
      } catch (e) {
        mainPred.textContent = 'Network error';
        mainPred.classList.remove('locked');
      }
    }

    async function ensureCamera() {
      if (stream) return true;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30, max: 30 },
          },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        return true;
      } catch (e) {
        mainPred.textContent = 'Camera unavailable';
        mainPred.classList.remove('locked');
        return false;
      }
    }

    btnReset.addEventListener('click', async () => {
      applyFullResetUI();
      const ok = await ensureCamera();
      if (!ok) return;
      if (timer) clearInterval(timer);
      timer = setInterval(tick, INTERVAL_MS);
    });
  </script>
</body>
</html>
